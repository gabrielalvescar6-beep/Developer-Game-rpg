<head>

   <style>

html, body{
    margin: 0;
    padding: 0;
    overflow: hidden; /* impede rolagem da página */
}

a { 
    background-color: rgba(0, 0, 0, 0.911);
    color: #ffffff;
    font-size: larger;
    padding: 10px 20px;
    text-decoration: none;
    border-radius: 100%;
    transition: background-color 0.3s ease;
    display: inline-block;
    margin-top: 5px;
    margin-right: 95%;
    border: 3px solid #d8b101cc;
}

a:hover { 
    background-color: rgba(228, 215, 116, 0.8);
}

#bgVideo{
    position: fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
    z-index:-1;
}

</style>


<video id="bgVideo" playsinline>
    <source src="assets/videos/historia_video.mp4" type="video/mp4">
</video>


<button onclick="document.getElementById('bgVideo').play(); this.style.display='none';"
style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; font-size: 24px; background-color: rgba(0, 0, 0, 0.7); color: #000000; border: none; border-radius: 10px; cursor: pointer;">

<img src="assets/images/play_button.png" 
alt="Poster do vídeo"
style="width: 200px; height: auto; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.5);">

</button>


</body>
