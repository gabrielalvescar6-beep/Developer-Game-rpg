<!DOCTYPE html>
<html lang=pt-br>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Realms</title>
    <link id="pagestyle" rel="stylesheet" href="lógica.css">
    <link rel="shortcut icon" href="image-removebg-preview.ico" type="image/x-icon">
</head>
<body>
    <header class="topbar">
        <div class="logo">
            <!-- substitua pelo logotipo real -->
            <img src="logo.png" alt="Code Realms">
        </div>
        <nav class="menu">
            <ul>
                <li><a href="#">Regras</a></li>
                <li><a href="#">História</a></li>
                <li><a href="#">:</a></li>
                <li><a href="sobre.html">mais sobre nós</a></li>
                <li><a href="#">configurações</a></li>
            </ul>
        </nav>
        <div class="icons">
           
            <span class="toggle-menu">
                <!-- ícone de menu para mobile -->
                ☰
            </span>
        </div>
    </header>

    <div class="scene">
        <!-- a imagem de fundo é definida via CSS -->
        <div class="overlay">
            <div class="text">
                <h1>programming <br> logic</h1>
                <p>A lógica e uma força implacável, uma muralha de codigo construida para te cacar. <br> Seus algoritmos sao sentenças de morte; suas sequências, um caminho para a aniquilaçao total.Tente decifra-la... ou seja deletado.</p>
                <button class="play-now">Enter this world</button>
            </div>
        </div>
        <div class="controls">
            <button data-index="0">1</button>
            <button data-index="1">2</button>
            <button data-index="2">3</button>
            <button data-index="3">4</button>
            <button data-index="4">5</button>
            <button data-index="5">6</button>
        </div>
        <button class="play-button">▶</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
