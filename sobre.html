body {

        .gif-stack {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            align-items: flex-end;
            z-index: 1000;
        }
        .gif-item {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .gif-label {
            font-size: 12px;
            color: #fff;
            background: rgba(0,0,0,0.55);
            padding: 4px 8px;
            border-radius: 6px;
        }
        .gif-stack img {
            width: 250px;
            height: 250px;
            object-fit: contain;
            border-radius: 50%;
            display: block;
            transition: filter 200ms ease, box-shadow 200ms ease, transform 200ms ease;
            cursor: pointer;
        }
        .gif-item:hover img {
            
            transform: scale(1.02);
        }
        .gif-item:nth-child(1) img:hover {
            filter: drop-shadow(0 0 10px rgb(0, 255, 213));
        }
        .gif-item:nth-child(2) img:hover {
            filter: drop-shadow(0 0 10px #7700ffb3);
        }
        .gif-item:nth-child(3) img:hover {
            filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.7));
            
        }
        .gif-item:nth-child(4) img:hover {
            filter: drop-shadow(0 0 15px rgba(1, 238, 255, 0.7));
            
        }
         .gif-item:nth-child(5) img:hover {
            filter: drop-shadow(0 0 15px rgba(255, 0, 255, 0.7));
            
        }
        .gif-tooltip {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 6px 10px;
            border-radius: 6px;
            white-space: nowrap;
            font-size: 12px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 150ms ease, visibility 150ms ease;
            pointer-events: none;
        }
        .gif-item:hover .gif-tooltip {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
    </style>
</head>
